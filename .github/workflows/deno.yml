name: Deno CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install deps
        run: deno ci

      - name: Check
        run: deno check src/main.ts

      - name: Lint
        run: deno lint

      - name: Format check
        run: deno fmt --check
